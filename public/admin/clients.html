<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Clients — 5 Cypress Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin-light.css">
</head>
<body>
<div id="admin-sidebar"></div>
<div class="a-main">
  <div class="a-topbar">
    <div class="a-page-title">Clients</div>
    <span class="a-topbar-badge" id="topBadge">Loading…</span>
    <a href="/admin/newclient" class="btn btn-primary"><i class="ri-add-line"></i> New Client</a>
  </div>
  <div class="a-content">
    <div class="a-card">
      <div class="a-card-header">
        <div class="a-card-title">Client Directory</div>
        <span class="a-card-sub" id="clientCount">Loading…</span>
      </div>
      <div class="a-table-wrap">
        <table class="a-table" id="clientsTable" style="display:none">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th>Client</th>
              <th class="hide-sm">Industry</th>
              <th class="hide-sm">Contact</th>
              <th class="hide-sm">Website</th>
              <th class="hide-sm">Onboarded</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="clientsBody"></tbody>
        </table>
      </div>
      <div id="loadingState"><div class="a-spinner"></div></div>
      <div id="emptyState" class="a-empty" style="display:none">
        <i class="ri-building-line"></i>
        <div class="a-empty-title">No clients found</div>
        <p>Add a client to get started.</p>
        <a href="/admin/newclient" class="btn btn-primary" style="margin-top:12px">New Client</a>
      </div>
    </div>
  </div>
</div>
<script>
  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function safe(v){return v||'—';}

  function statusPill(s){
    const map={active:'active',paused:'paused',trial:'trial',prospecting:'trial',proposal:'trial'};
    const cls=map[(s||'').toLowerCase()]||'paused';
    const label=s||'unknown';
    return `<span class="client-status ${cls}">${esc(label)}</span>`;
  }

  async function loadClients(){
    try{
      const res=await fetch('/admin/api/clients');
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||'Failed to load clients');

      const clients=data.clients||[];
      document.getElementById('topBadge').textContent=`${clients.length} client${clients.length!==1?'s':''}`;
      document.getElementById('clientCount').textContent=`${clients.length} total`;

      document.getElementById('loadingState').style.display='none';

      if(!clients.length){
        document.getElementById('emptyState').style.display='block';
        return;
      }

      document.getElementById('clientsTable').style.display='table';
      document.getElementById('clientsBody').innerHTML=clients.map((c,i)=>{
        const emailLink=c.contact_email
          ?`<a href="mailto:${esc(c.contact_email)}" style="color:var(--green)">${esc(c.contact_email)}</a>`
          :(c.contact_name?esc(c.contact_name):'—');
        const websiteLink=c.website
          ?`<a href="${esc(c.website)}" target="_blank" rel="noopener" style="color:var(--green)">${esc(c.website.replace(/^https?:\/\//,''))}</a>`
          :'—';
        const onboarded=c.onboarded
          ?new Date(c.onboarded).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
          :(c.createdAt?new Date(c.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—');
        return `<tr>
          <td class="mono tx-sm" style="color:var(--tx-3)">${i+1}</td>
          <td><strong style="font-weight:600">${esc(safe(c.name))}</strong><div class="a-lead-email">${esc(c.slug||'')}</div></td>
          <td class="tx-sm hide-sm">${esc(safe(c.industry))}</td>
          <td class="tx-sm hide-sm">${emailLink}</td>
          <td class="tx-sm hide-sm">${websiteLink}</td>
          <td class="tx-sm mono hide-sm">${onboarded}</td>
          <td>${statusPill(c.status)}</td>
        </tr>`;
      }).join('');
    }catch(e){
      document.getElementById('loadingState').innerHTML=`<div class="a-empty"><i class="ri-error-warning-line"></i><div class="a-empty-title">Failed to load clients</div><p>${esc(e.message)}</p></div>`;
    }
  }

  loadClients();
</script>
<script src="/admin/admin-shell.js"></script>
</body>
</html>
