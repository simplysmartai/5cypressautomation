<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Leads — 5 Cypress Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.0.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin-light.css">
</head>
<body>
<div id="admin-sidebar"></div>
<div class="a-main">
  <div class="a-topbar">
    <div class="a-topbar-left">
      <i class="a-topbar-icon ri-user-add-line"></i>
      <div class="a-page-title">Leads</div>
    </div>
    <div class="a-topbar-tabs">
      <a class="a-tab" href="/admin"><i class="ri-dashboard-line"></i> Dashboard</a>
      <a class="a-tab active" href="/admin/leads"><i class="ri-user-add-line"></i> Leads</a>
      <a class="a-tab" href="/admin/clients"><i class="ri-briefcase-line"></i> Clients</a>
    </div>
    <div class="a-topbar-right">
      <span class="a-topbar-badge" id="topBadge">Loading…</span>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()"><i class="ri-download-2-line"></i> Export CSV</button>
    </div>
  </div>
  <div class="a-content">
    <div class="a-filter-bar">
      <div class="a-search-wrap">
        <i class="ri-search-line"></i>
        <input class="a-search" type="search" id="searchInput" placeholder="Search name, email, company…" oninput="applyFilter()">
      </div>
      <select class="a-select" id="sourceFilter" onchange="applyFilter()"><option value="">All Sources</option></select>
      <select class="a-select" id="statusFilter" onchange="applyFilter()">
        <option value="">All Statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="closed">Closed</option>
        <option value="booked">Booked</option>
      </select>
    </div>
    <div class="a-card" id="tableCard">
      <div class="a-table-wrap">
        <table class="a-table" id="leadsTable" style="display:none">
          <thead><tr><th>Lead</th><th class="hide-sm">Company</th><th>Source</th><th>Status</th><th class="text-right hide-sm">Date</th></tr></thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
      <div id="loadingState"><div class="a-spinner"></div></div>
      <div id="emptyState" class="a-empty" style="display:none">
        <i class="ri-user-search-line"></i>
        <div class="a-empty-title">No leads match your filters</div>
        <p>Try adjusting the search or filters above.</p>
      </div>
      <div class="a-pagination" id="paginationBar" style="display:none">
        <span class="a-pg-meta" id="pgMeta"></span>
        <div class="a-pg-btns">
          <button class="a-pg-btn" id="pgPrev" onclick="changePage(-1)" disabled>← Prev</button>
          <button class="a-pg-btn" id="pgNext" onclick="changePage(1)">Next →</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="a-modal-overlay" id="detailModal">
  <div class="a-modal">
    <div class="a-modal-header">
      <div class="a-modal-title" id="modalTitle">Lead Detail</div>
      <button class="a-modal-close" onclick="closeModal()"><i class="ri-close-line"></i></button>
    </div>
    <div class="a-detail-grid" id="modalBody"></div>
    <div class="a-modal-footer">
      <label style="font-size:12px;font-weight:600;color:var(--tx-2);font-family:var(--fm);margin-right:4px">Status:</label>
      <select class="a-status-select" id="statusSelect" onchange="updateStatus()">
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="closed">Closed</option>
        <option value="booked">Booked</option>
      </select>
      <div style="flex:1"></div>
      <button class="btn btn-danger btn-sm" onclick="deleteLead()"><i class="ri-delete-bin-line"></i> Delete</button>
    </div>
  </div>
</div>
<script>
  let allLeads=[],filtered=[],activeId=null,page=0;
  const PAGE=25;
  function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function avatarColor(n){const c=['g','b','p','au'];let h=0;for(let i=0;i<(n||'').length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return c[h%c.length];}
  function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
  function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
  function pill(s){const cls={contacted:'contacted',closed:'closed',booked:'booked'}[s]||'new';return`<span class="pill ${cls}"><span class="pill-dot"></span>${esc(s||'new')}</span>`;}
  async function loadLeads(){try{const data=await fetch('/admin/api/leads?limit=500').then(r=>r.json());allLeads=data.leads||[];const week=Date.now()-7*86400000;const nw=allLeads.filter(l=>l.createdAt&&new Date(l.createdAt)>week).length;document.getElementById('topBadge').textContent=`${allLeads.length} total · ${nw} this week`;const sources=[...new Set(allLeads.map(l=>l.source).filter(Boolean))].sort();const sel=document.getElementById('sourceFilter');sources.forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sel.appendChild(o);});applyFilter();}catch(e){document.getElementById('loadingState').innerHTML=`<div class="a-empty"><i class="ri-error-warning-line"></i><div class="a-empty-title">Failed to load leads</div><p>${esc(e.message)}</p></div>`;}}
  function applyFilter(){const q=document.getElementById('searchInput').value.toLowerCase();const src=document.getElementById('sourceFilter').value;const st=document.getElementById('statusFilter').value;filtered=allLeads.filter(l=>{const mq=!q||[l.name,l.email,l.company,l.website].some(f=>f&&f.toLowerCase().includes(q));const ms=!src||l.source===src;const mst=!st||(l.status||'new')===st;return mq&&ms&&mst;});page=0;render();}
  function render(){const loading=document.getElementById('loadingState');const empty=document.getElementById('emptyState');const table=document.getElementById('leadsTable');const pgBar=document.getElementById('paginationBar');loading.style.display='none';if(!filtered.length){empty.style.display='block';table.style.display='none';pgBar.style.display='none';return;}empty.style.display='none';table.style.display='table';const start=page*PAGE;const slice=filtered.slice(start,start+PAGE);document.getElementById('leadsBody').innerHTML=slice.map(l=>`<tr onclick="openModal(${l.id})"><td><div class="a-lead-cell"><div class="a-avatar ${avatarColor(l.name)}">${esc(initials(l.name))}</div><div><div class="a-lead-name">${esc(l.name||'—')}</div><div class="a-lead-email">${esc(l.email||'')}</div></div></div></td><td class="tx-sm hide-sm">${esc(l.company||'—')}</td><td><span class="src-badge">${esc(l.source||'web')}</span></td><td>${pill(l.status)}</td><td class="tx-sm mono text-right hide-sm">${fmtDate(l.createdAt)}</td></tr>`).join('');const total=filtered.length;const end=Math.min(start+PAGE,total);document.getElementById('pgMeta').textContent=`Showing ${start+1}–${end} of ${total}`;document.getElementById('pgPrev').disabled=page===0;document.getElementById('pgNext').disabled=end>=total;pgBar.style.display='flex';}
  function changePage(dir){page+=dir;render();document.getElementById('tableCard').scrollIntoView({behavior:'smooth',block:'start'});}
  function openModal(id){const l=allLeads.find(x=>x.id===id);if(!l)return;activeId=id;document.getElementById('modalTitle').textContent=l.name||'Lead Detail';const fields=[['Name',l.name],['Email',l.email?`<a href="mailto:${esc(l.email)}" style="color:var(--green)">${esc(l.email)}</a>`:null],['Company',l.company],['Website',l.website?`<a href="${esc(l.website)}" target="_blank" style="color:var(--green)">${esc(l.website)}</a>`:null],['Source',l.source],['Scanned',l.scanned_domain],['Challenge',l.challenge],['Timeline',l.timeline],['Date',fmtDate(l.createdAt)]].filter(([,v])=>v);document.getElementById('modalBody').innerHTML=fields.map(([k,v])=>`<span class="a-detail-key">${k}</span><span class="a-detail-val">${(v&&v.includes('<'))?v:esc(v)}</span>`).join('');document.getElementById('statusSelect').value=l.status||'new';document.getElementById('detailModal').classList.add('open');}
  function closeModal(){document.getElementById('detailModal').classList.remove('open');activeId=null;}
  async function updateStatus(){if(!activeId)return;const status=document.getElementById('statusSelect').value;try{const r=await fetch(`/admin/api/leads/${activeId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});if(!r.ok)throw new Error('Update failed');const lead=allLeads.find(l=>l.id===activeId);if(lead)lead.status=status;applyFilter();}catch(e){alert('Failed to update status: '+e.message);}}
  async function deleteLead(){if(!activeId)return;const lead=allLeads.find(l=>l.id===activeId);if(!confirm(`Delete lead for ${lead?.name||'this lead'}? This cannot be undone.`))return;try{const r=await fetch(`/admin/api/leads/${activeId}`,{method:'DELETE'});if(!r.ok)throw new Error('Delete failed');allLeads=allLeads.filter(l=>l.id!==activeId);document.getElementById('topBadge').textContent=`${allLeads.length} total`;closeModal();applyFilter();}catch(e){alert('Failed to delete: '+e.message);}}
  function exportCSV(){const cols=['id','name','email','company','website','source','scanned_domain','challenge','timeline','status','createdAt'];const header=cols.join(',');const rows=filtered.map(l=>cols.map(c=>{const v=String(l[c]??'').replace(/"/g,'""');return(v.includes(',')||v.includes('"')||v.includes('\n'))?`"${v}"`:v;}).join(','));const blob=new Blob([header+'\n'+rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`leads-${new Date().toISOString().split('T')[0]}.csv`;a.click();}
  document.getElementById('detailModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  loadLeads();
</script>
<script src="/admin/admin-shell.js"></script>
</body>
</html>
