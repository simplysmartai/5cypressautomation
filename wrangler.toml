name = "5cypress"

# Cloudflare Pages configuration
pages_build_output_dir = "public"

# Note: Cron triggers (_scheduled.js) are not supported in Pages directly.
# To enable scheduled skills, deploy _scheduled.js as a separate Cloudflare Worker.
# See PHASE_3_COMPLETE.md for worker deployment instructions.

# ── KV Namespaces ─────────────────────────────────────────────────────────────
# SEO Audit storage — stores raw audit data + enriched premium reports + Stripe sessions
# Created via: npx wrangler kv namespace create SEO_AUDITS_KV
[[kv_namespaces]]
binding = "SEO_AUDITS_KV"
id = "adb56962135c4b6c8e610202123121ed"

# ── Required Cloudflare Pages env secrets ─────────────────────────────────────
# Set these in: Cloudflare Dashboard → Pages → 5cypress → Settings → Variables
#
#   RESEND_API_KEY                 — Resend API key for email notifications
#   DEFAULT_FROM                   — Sender address (e.g. nick@5cypress.com)
#   CALENDLY_WEBHOOK_SIGNING_KEY   — Signing key from webhook registration
#   ADMIN_TOKEN                    — Bearer token for GET /api/leads
#   ADMIN_USER                     — Admin Basic Auth username (for SEO admin access)
#   ADMIN_PASS                     — Admin Basic Auth password (for SEO admin access)
#
#   SEO + Premium Report secrets:
#   DATAFORSEO_USERNAME            — DataForSEO account email
#   DATAFORSEO_PASSWORD            — DataForSEO API password
#   GOOGLE_PAGESPEED_API_KEY       — Google PageSpeed Insights API key
#   OPENAI_API_KEY                 — OpenAI API key (gpt-4o-mini for report enrichment)
#   STRIPE_SECRET_KEY              — Stripe secret key (sk_live_... or sk_test_...)
#   STRIPE_WEBHOOK_SECRET          — Stripe webhook signing secret (whsec_...)
#   STRIPE_PRICE                   — $49 USD (4900 cents, set in code — no need to set here)
#
# One-time webhook registration (run after first deploy):
#   node execution/register_calendly_webhook.js https://5cypress.com/api/webhooks/calendly
#   Register Stripe webhook at: https://dashboard.stripe.com/webhooks → https://5cypress.com/api/seo/webhook
